name: keep-warm

# Pings the Render free-tier API so it doesn't spin down (which causes a ~50s
# cold start on the next request). Runs in this public repo where Actions minutes
# are free. GitHub cron is best-effort (can be delayed under load), so this reduces
# cold starts during active hours rather than eliminating them — upgrade the Render
# plan for a guaranteed always-on instance.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --max-time 90 https://coverage-router-ksa-api.onrender.com/health || true
